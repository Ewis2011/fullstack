<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <img src="#">

<script>
  const img = document.querySelector('img');

  async function loadGif() {
    try {
      const response = await fetch(
        'https://api.giphy.com/v1/gifs/translate?api_key=xbSbgpkqV7pY9mvOEXRApATdFZZq5FRS&s=anime'
      );

      const data = await response.json();
      img.src = data.data.images.original.url;

    } catch (error) {
      console.error(error);
    }
  }

  loadGif();
</script>
</body>
</html>
